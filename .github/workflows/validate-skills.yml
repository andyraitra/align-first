name: validate-skills

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-skills:
    name: validate-skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: python3 .github/scripts/validate_skills.py
